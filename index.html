<!DOCTYPE html>
<html>
<head>
<title>AI Voice Generator</title>
</head>

<body>

<h1>Free AI Voice Generator</h1>

<textarea id="text" placeholder="Enter text"></textarea>

<br><br>

<button onclick="generate()">Generate Voice</button>

<br><br>

<audio id="audio" controls></audio>

<script>
async function generate(){

let text = document.getElementById("text").value;

let response = await fetch(
"https://api-inference.huggingface.co/models/microsoft/speecht5_tts",
{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({inputs:text})
}
);

let audioBlob = await response.blob();

let audioURL = URL.createObjectURL(audioBlob);

document.getElementById("audio").src = audioURL;

}
</script>

</body>
</html>
